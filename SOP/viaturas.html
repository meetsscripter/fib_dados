<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>FBI Academy - Portal de Acesso e Diretrizes</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@300;400;700&family=Georgia&display=swap" rel="stylesheet">
  <style>
    /* ... (Mantive todos os seus estilos originais aqui para preservar o design) ... */
    body { background: #060913; font-family: 'Roboto', sans-serif; color: #e2e8f0; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    .portal-container { width: 100%; height: 100vh; display: grid; grid-template-columns: 380px 1fr; background: #080c18; }
    .identity-sidebar { background: #0a0f24; border-right: 3px solid #d4af37; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
    .sidebar-logo { width: 100px; height: auto; margin-bottom: 15px; }
    .access-badge { width: 100%; background: #ffffff; padding: 20px; border-radius: 8px; color: #1a1a1a; }
    .auth-btn { width: 100%; padding: 12px; background: #002d62; color: white; border: 1px solid #d4af37; cursor: pointer; text-transform: uppercase; font-weight: 700; }
    
    /* NOVO: Estilo para os dados da planilha */
    .dados-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; padding: 20px; }
    .data-card { background: #0a0f24; border: 1px solid #1e293b; padding: 15px; color: #fff; font-family: 'Roboto Mono', monospace; font-size: 12px; }
    .data-card strong { color: #d4af37; display: block; font-size: 14px; }
  </style>
</head>
<body>

  <div class="portal-container">
    <div class="identity-sidebar">
      <img src="imagem/Logo.png" alt="FBI Seal" class="sidebar-logo">
      <div class="access-badge">
        <button class="auth-btn" id="btn-auth">Escanear Biometria (Discord)</button>
        <div id="login-status-label" style="text-align:center; margin-top:10px;">Aguardando autorização...</div>
      </div>
    </div>

    <div class="portal-main">
      <div id="painel-dados" class="dados-container">
        </div>
    </div>
  </div>

  <script>
    const URL_PLANILHA = "SUA_URL_DO_APP_SCRIPT_AQUI"; // <--- COLE SUA URL AQUI

    /* ================= LOGIN DISCORD (SEU CÓDIGO ORIGINAL) ================= */
    async function loginWithDiscord() {
      const res = await fetch('https://script.google.com/macros/s/AKfycbxrRV92GPFiss3l0iO6RYQhTurTXd4gZrmK-3rxW_esbxlBLijKhF-xrE0tmawOfIPm/exec');
      const data = await res.json();
      const popup = window.open(data.url, "DiscordLogin", "width=500,height=700");
      return new Promise((resolve) => {
        const interval = setInterval(() => {
          try {
            const hash = popup.location.hash;
            if (hash) { clearInterval(interval); popup.close(); resolve(new URLSearchParams(hash.substring(1)).get("access_token")); }
          } catch {}
        }, 500);
      });
    }

    async function fetchDiscordUser(token) {
      const res = await fetch("https://discord.com/api/users/@me", { headers: { Authorization: `Bearer ${token}` } });
      return await res.json();
    }

    /* ================= LÓGICA DE INTEGRAÇÃO ================= */
    document.getElementById("btn-auth").onclick = async () => {
      const token = await loginWithDiscord();
      const user = await fetchDiscordUser(token);
      
      // Busca dados na planilha passando o ID do usuário
      const res = await fetch(`${URL_PLANILHA}?id=${user.id}`);
      const dados = await res.json();

      if (dados.error) {
        alert("Agente não encontrado na base de dados.");
      } else {
        const container = document.getElementById("painel-dados");
        container.innerHTML = `
          <div class="data-card"><strong>HIERARQUIA</strong>${dados.hierarquia}</div>
          <div class="data-card"><strong>ADMISSÃO</strong>${dados.admissao}</div>
          <div class="data-card"><strong>ADVERTÊNCIAS</strong>${dados.advertencias}</div>
          <div class="data-card"><strong>INVESTIGAÇÕES</strong>${dados.investigacoes}</div>
          <div class="data-card"><strong>AUSÊNCIAS</strong>${dados.ausencias}</div>
          <div class="data-card"><strong>OPERAÇÕES</strong>${dados.operacoes}</div>
        `;
      }
    };
  </script>
</body>
</html>
